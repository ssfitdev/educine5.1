<!DOCTYPE html>

      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: #0f0f11
          url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjMTAxMDEyIj48L3JlY3Q+CjxwYXRoIGQ9Ik0wIDVMNSAwWk02IDRMNCA2Wk0tMSAxTDEgLTFaIiBzdHJva2U9IiMxNzE3MTkiIHN0cm9rZS13aWR0aD0iMSI+PC9wYXRoPgo8L3N2Zz4=");
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        flex-direction: column;
      }

      /* Typography */
      h1 {
        color: white;
        font-size: 1.875rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
      }

      p {
        color: #cccccc;
        font-size: 1.125rem;
      }

      /* Accent Gradient combining #FF007A and #883ff9 */
      .educine-gradient {
        background: linear-gradient(135deg, #ff007a 0%, #883ff9 100%);
        color: #ffffff;
      }

      /* Card Styling */
      .form-card {
        background: linear-gradient(135deg, #1a1a1d, #1f1f22);
        box-shadow: 0 12px 35px -10px rgba(136, 63, 249, 0.25);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 2rem;
        backdrop-filter: blur(4px);
        width: 100%;
        max-width: 28rem;
      }

      /* Form Elements */
      label {
        color: #f8fafc !important;
        font-weight: 500;
        margin-bottom: 0.5rem;
        display: block;
        font-size: 0.875rem;
      }

      ::placeholder {
        color: #94a3b8 !important;
        opacity: 0.8;
      }

      .input-field {
        background-color: #222227;
        border: 1px solid #4b5563;
        color: #ffffff;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        transition: all 0.2s ease;
        width: 100%;
      }

      .input-field:hover {
        border-color: #6b7280;
      }

      .input-field:focus {
        border-color: #883ff9;
        box-shadow: 0 0 0 3px rgba(136, 63, 249, 0.3);
        outline: none;
      }

      /* Checkbox Styling */
      .checkbox {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border: 2px solid #6b7280;
        border-radius: 4px;
        cursor: pointer;
        position: relative;
        transition: all 0.2s ease;
      }

      .checkbox:checked {
        background-color: #883ff9;
        border-color: #883ff9;
      }

      .checkbox:checked::after {
        content: "✓";
        position: absolute;
        color: white;
        font-size: 12px;
        left: 2px;
        top: -1px;
      }

      /* Button Styling */
      .btn-primary {
        background: linear-gradient(
          135deg,
          #ff007a 0%,
          #883ff9 100%
        ) !important;
        color: white;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        cursor: pointer;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(136, 63, 249, 0.25);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      /* Animations */
      .animate-bounce-once {
        animation: bounce 0.5s ease;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      /* Responsive Adjustments */
      @media (max-width: 640px) {
        .form-card {
          padding: 1.5rem;
        }

        .grid-cols-2 {
          grid-template-columns: 1fr;
        }
      }

      /* Success Modal Enhancements */
      #successModal .rounded-md {
        border: 2px solid transparent;
        background-clip: padding-box;
        background: linear-gradient(135deg, #1a1a1d, #1f1f22);
        position: relative;
      }

      #successModal .rounded-md::before {
        content: "";
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(135deg, #ff007a, #883ff9);
        z-index: -1;
        border-radius: 8px;
      }

      /* Stall selection section (copied from registeration25.html to keep UI identical) */
      .stalls-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin: 20px 0;
      }

      .stall-option {
        position: relative;
      }

      .stall-checkbox {
        position: absolute;
        opacity: 0;
        cursor: pointer;
      }

      .stall-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        background: white;
        cursor: pointer;
        transition: all 0.3s ease;
        height: 100%;
        text-align: center;
      }

      .stall-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      .stall-checkbox:checked + .stall-card {
        border-color: #ff007a;
        background: rgba(255, 0, 122, 0.05);
        box-shadow: 0 8px 15px rgba(255, 0, 122, 0.2);
      }

      .stall-icon {
        font-size: 36px;
        margin-bottom: 10px;
      }

      .stall-name {
        font-size: 16px;
        font-weight: 600;
        color: #333;
      }

      @media (max-width: 480px) {
        .stalls-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const step1 = document.getElementById("step1");
        const step2 = document.getElementById("step2");
        const nextBtn = document.getElementById("nextBtn");
        const backBtn = document.getElementById("backBtn");
        const districtSelect = document.getElementById("district");
        const divisionContainer = document.getElementById("divisionContainer");
        const divisionSelect = document.getElementById("division");
        const sectorContainer = document.getElementById("sectorContainer");
        const sectorSelect = document.getElementById("sector");
        const whatsappInput = document.getElementById("whatsapp");
        const whatsappValidIcon = document.getElementById("whatsappValidIcon");
        const whatsappError = document.getElementById("whatsappError");
        
        // Kerala state ID for fetching districts
        const KERALA_STATE_ID = "p97po7woj9xtuy4lhi3bosvl";

        let districtsData = [];
        let divisionsData = [];
        let sectorsData = [];
        
        // Store selected entity IDs
        let selectedDistrictId = null;
        let selectedDivisionId = null;
        let selectedSectorId = null;

        function setSelectOptions(selectEl, placeholder, values) {
          if (!selectEl) return;
          selectEl.innerHTML = "";
          const ph = document.createElement("option");
          ph.value = "";
          ph.disabled = true;
          ph.selected = true;
          ph.textContent = placeholder;
          selectEl.appendChild(ph);
          (values || []).forEach((v) => {
            const opt = document.createElement("option");
            opt.value = v;
            opt.textContent = v;
            selectEl.appendChild(opt);
          });
        }

        async function loadLocations() {
          try {
            setSelectOptions(districtSelect, "Loading districts...", []);
            
            // Fetch districts using Kerala state ID
            const apiUrl = (function () {
              if (typeof window !== "undefined" && /^https?:$/.test(window.location.protocol)) {
                return new URL(`/api/entities?parentId=${KERALA_STATE_ID}`, window.location.origin).href;
              }
              return `https://www.educine.in/api/entities?parentId=${KERALA_STATE_ID}`;
            })();

            const response = await fetch(apiUrl, {
              method: 'GET',
              headers: {
                'Content-Type': 'application/json'
              }
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const responseData = await response.json();
            console.log('Districts loaded:', responseData);

            // Extract districts array from response
            districtsData = responseData.data || [];
            
            if (districtsData.length === 0) {
              setSelectOptions(districtSelect, "No districts available", []);
              return;
            }

            // Populate district dropdown with names
            const districtNames = districtsData.map(d => d.name).sort();
            setSelectOptions(districtSelect, "Select your district", districtNames);
            
          } catch (e) {
            console.error('Error loading districts:', e);
            setSelectOptions(
              districtSelect,
              "Failed to load districts (refresh)",
              []
            );
          }
        }

        function showStep(step) {
          if (step === 1) {
            step1.classList.remove("hidden");
            step2.classList.add("hidden");
            step1.scrollIntoView({ behavior: "smooth", block: "start" });
            return;
          }
          step1.classList.add("hidden");
          step2.classList.remove("hidden");
          step2.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        // Default to step 1
        showStep(1);

        nextBtn?.addEventListener("click", function () {
          const name = document.getElementById("name");
          const whatsapp = document.getElementById("whatsapp");
          const studentClass = document.getElementById("class");
          const institution = document.getElementById("institution");
          const district = document.getElementById("district");
          const division = document.getElementById("division");
          const sector = document.getElementById("sector");

          // Basic validation for step 1 required fields
          if (
            !name?.value?.trim() ||
            !whatsapp?.value?.trim() ||
            !studentClass?.value ||
            !institution?.value?.trim() ||
            !district?.value
          ) {
            showAlert("Please fill in all required fields before continuing");
            return;
          }

          if (!division?.value || !sector?.value) {
            showAlert("Please select District, Division, and Sector");
            return;
          }

          showStep(2);
        });

        backBtn?.addEventListener("click", function () {
          showStep(1);
        });

        // Validate WhatsApp number
        whatsappInput.addEventListener("input", function () {
          const isValid = /^[0-9]{10}$/.test(this.value);
          if (isValid) {
            whatsappValidIcon.classList.remove("hidden");
            whatsappError.classList.add("hidden");
          } else {
            whatsappValidIcon.classList.add("hidden");
            if (this.value.length > 0) {
              whatsappError.classList.remove("hidden");
            } else {
              whatsappError.classList.add("hidden");
            }
          }
        });

        loadLocations();

        districtSelect?.addEventListener("change", async function () {
          const districtName = this.value;
          
          // Find the district object by name
          const districtObj = districtsData.find(d => d.name === districtName);
          
          if (!districtObj) {
            console.error('District not found:', districtName);
            return;
          }

          const districtId = districtObj.id || districtObj._id;
          selectedDistrictId = districtId; // Store selected district ID
          
          // Reset division and sector selections
          selectedDivisionId = null;
          selectedSectorId = null;
          
          divisionContainer.classList.remove("hidden");
          sectorContainer.classList.add("hidden");
          setSelectOptions(divisionSelect, "Loading divisions...", []);
          setSelectOptions(sectorSelect, "Select a division first", []);

          try {
            // Fetch divisions for selected district
            const apiUrl = (function () {
              if (typeof window !== "undefined" && /^https?:$/.test(window.location.protocol)) {
                return new URL(`/api/entities?parentId=${districtId}`, window.location.origin).href;
              }
              return `https://www.educine.in/api/entities?parentId=${districtId}`;
            })();

            const response = await fetch(apiUrl, {
              method: 'GET',
              headers: {
                'Content-Type': 'application/json'
              }
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const responseData = await response.json();
            console.log('Divisions loaded:', responseData);

            divisionsData = responseData.data || [];
            
            if (divisionsData.length === 0) {
              setSelectOptions(divisionSelect, "No divisions available", []);
              return;
            }

            const divisionNames = divisionsData.map(d => d.name).sort();
            setSelectOptions(divisionSelect, "Select your division", divisionNames);
            
          } catch (e) {
            console.error('Error loading divisions:', e);
            setSelectOptions(divisionSelect, "Failed to load divisions", []);
          }
        });

        divisionSelect?.addEventListener("change", async function () {
          const divisionName = this.value;
          
          // Find the division object by name
          const divisionObj = divisionsData.find(d => d.name === divisionName);
          
          if (!divisionObj) {
            console.error('Division not found:', divisionName);
            return;
          }

          const divisionId = divisionObj.id || divisionObj._id;
          selectedDivisionId = divisionId; // Store selected division ID
          
          // Reset sector selection
          selectedSectorId = null;
          
          sectorContainer.classList.remove("hidden");
          setSelectOptions(sectorSelect, "Loading sectors...", []);

          try {
            // Fetch sectors for selected division
            const apiUrl = (function () {
              if (typeof window !== "undefined" && /^https?:$/.test(window.location.protocol)) {
                return new URL(`/api/entities?parentId=${divisionId}`, window.location.origin).href;
              }
              return `https://www.educine.in/api/entities?parentId=${divisionId}`;
            })();

            const response = await fetch(apiUrl, {
              method: 'GET',
              headers: {
                'Content-Type': 'application/json'
              }
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const responseData = await response.json();
            console.log('Sectors loaded:', responseData);

            sectorsData = responseData.data || [];
            
            if (sectorsData.length === 0) {
              setSelectOptions(sectorSelect, "No sectors available", []);
              return;
            }

            const sectorNames = sectorsData.map(d => d.name).sort();
            setSelectOptions(sectorSelect, "Select your sector", sectorNames);
            
          } catch (e) {
            console.error('Error loading sectors:', e);
            setSelectOptions(sectorSelect, "Failed to load sectors", []);
          }
        });
        
        // Track sector selection to get its entity ID
        sectorSelect?.addEventListener("change", function () {
          const sectorName = this.value;
          const sectorObj = sectorsData.find(d => d.name === sectorName);
          
          if (sectorObj) {
            selectedSectorId = sectorObj.id || sectorObj._id;
            console.log('Selected sector ID:', selectedSectorId);
          }
        });

        // Form submission handler (moved inside DOMContentLoaded for variable access)
        document
          .getElementById("studentForm")
          .addEventListener("submit", function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById("submitBtn");
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Processing...
        `;

          // Validate WhatsApp number
          const whatsapp = document.getElementById("whatsapp").value;
          if (!/^[0-9]{10}$/.test(whatsapp)) {
            showAlert("Please enter a valid 10-digit WhatsApp number");
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
            return;
          }

          // Career interests section is currently disabled in the UI
          // const checkboxes = document.querySelectorAll('input[name="interests"]:checked');
          // const interests = Array.from(checkboxes).map((cb) => cb.value);

          const stallCheckboxes = document.querySelectorAll(
            'input[name="stalls[]"]:checked'
          );
          const stalls = Array.from(stallCheckboxes).map((cb) => cb.value);

          const formData = {
            name: document.getElementById("name").value,
            whatsapp: whatsapp,
            class: document.getElementById("class").value,
            institution: document.getElementById("institution").value,
            district: document.getElementById("district").value,
            division:
              document.getElementById("division")?.value || "Not applicable",
            sector: document.getElementById("sector")?.value || "Not applicable",
            // interests: interests.length > 0 ? interests : null,
            stalls: stalls.length > 0 ? stalls : [],
          };

          // Validate required fields
          if (
            !formData.name ||
            !formData.class ||
            !formData.institution ||
            !formData.district
          ) {
            showAlert("Please fill in all required fields");
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
            return;
          }

          // Validate dependent dropdowns
          if (!formData.division || formData.division === "Not applicable") {
            showAlert("Please select your division");
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
            return;
          }
          if (!formData.sector || formData.sector === "Not applicable") {
            showAlert("Please select your sector");
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
            return;
          }

          const apiUrl = (function () {
            if (
              typeof window !== "undefined" &&
              /^https?:$/.test(window.location.protocol)
            ) {
              return new URL("/api/educine", window.location.origin).href;
            }
            return "https://portal.ssfkerala.org/api/educine";
          })();

          const apiPayload = {
            type: "student",
            name: formData.name,
            phone: formData.whatsapp,
            class: formData.class,
            institution: formData.institution,
            district: formData.district,
            division: formData.division,
            sector: formData.sector,
            stalls: formData.stalls,
            entityId: selectedSectorId, // Send sector's entity ID for mapping
          };
          
          console.log("Submitting payload:", apiPayload);

          fetch(apiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(apiPayload),
          })
            .then(async (res) => {
              if (!res.ok) {
                let msg = "Registration failed. Please try again.";
                try {
                  const errBody = await res.json();
                  console.log("Error response:", errBody);
                  if (errBody && (errBody.message || errBody.error)) {
                    msg = errBody.message || errBody.error;
                  }
                } catch (_) {}
                console.error("HTTP Status:", res.status, "Message:", msg);
                throw new Error(msg);
              }
              showSuccessModal(
                "Registration successful! We'll contact you soon."
              );
              document.getElementById("studentForm").reset();
              document
                .getElementById("divisionContainer")
                .classList.add("hidden");
              document
                .getElementById("sectorContainer")
                .classList.add("hidden");
              document
                .getElementById("whatsappValidIcon")
                .classList.add("hidden");
              // Don't re-enable button on success - prevent duplicate submissions
              // submitBtn.disabled = false;
              // submitBtn.innerHTML = originalText;
            }) // Close .then()
            .catch((error) => {
              showAlert("Registration failed. Please try again later.");
              console.error("Error:", error);
              submitBtn.disabled = false;
              submitBtn.innerHTML = originalText;
            });
        }); // Close form submit handler

        // Modal close handler
        document
          .querySelector(".modal-close")
          .addEventListener("click", function () {
            document.getElementById("successModal").classList.add("hidden");
          });
      }); // Close DOMContentLoaded

      // Standalone helper functions (outside DOMContentLoaded)
      function showSuccessModal(message) {
        const modal = document.getElementById("successModal");
        const messageElement = modal.querySelector(".modal-message");
        messageElement.textContent =
          message || "Thank you for registering with educine.in";
        modal.classList.remove("hidden");
      }

      function showAlert(message) {
        const alertDiv = document.createElement("div");
        alertDiv.className =
          "mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg relative";
        alertDiv.role = "alert";
        alertDiv.innerHTML = `
          <span class="block sm:inline">${message}</span>
          <span class="absolute top-0 bottom-0 right-0 px-4 py-3 alert-close">
            <svg class="fill-current h-6 w-6 text-red-500" role="button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
              <title>Close</title>
              <path d="M14.348 14.849a1.2 1.2 0 0 1-1.697 0L10 11.819l-2.651 3.029a1.2 1.2 0 1 1-1.697-1.697l2.758-3.15-2.759-3.152a1.2 1.2 0 1 1 1.697-1.697L10 8.183l2.651-3.031a1.2 1.2 0 1 1 1.697 1.697l-2.758 3.152 2.758 3.15a1.2 1.2 0 0 1 0 1.698z"/>
            </svg>
          </span>
        `;

        const container = document.querySelector(".form-card");
        container.prepend(alertDiv);

        alertDiv.querySelector(".alert-close").addEventListener("click", () => {
          alertDiv.remove();
        });

        setTimeout(() => {
          if (document.body.contains(alertDiv)) {
            alertDiv.remove();
          }
        }, 5000);
      }
    </script>
  </body>
</html>
